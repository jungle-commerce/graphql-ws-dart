name: graphql_ws_flutter
description: >-
  Flutter integration for graphql_ws — keeps the GraphQL over WebSocket
  connection alive across app lifecycle changes and flaky mobile connectivity.
version: 0.1.0
repository: https://github.com/jungle-commerce/graphql-ws-dart
issue_tracker: https://github.com/jungle-commerce/graphql-ws-dart/issues

environment:
  sdk: ^3.5.0
  flutter: '>=3.10.0'

resolution: workspace

dependencies:
  connectivity_plus: ^7.1.1
  flutter:
    sdk: flutter
  graphql_ws: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  graphql_ws_test_server:
    path: ../graphql_ws_test_server
  lints: ^6.1.0
