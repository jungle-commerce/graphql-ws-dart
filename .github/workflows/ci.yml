name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Format · Analyze · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Flutter includes Dart; needed for workspace resolution (graphql_ws_flutter
      # is a workspace member and pulls in the flutter SDK dep).
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version-file: .fvmrc

      - name: Get dependencies
        run: flutter pub get

      - name: Format
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test graphql_ws
        run: dart test packages/graphql_ws

      - name: Test graphql_ws_web_socket_channel_connector
        run: dart test packages/graphql_ws_web_socket_channel_connector

      - name: Test graphql_ws_flutter
        run: flutter test packages/graphql_ws_flutter
